<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Writer // 小说创作系统</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-left">
                <h1 id="project-title">小说创作系统</h1>
                <select id="project-selector" class="project-select" onchange="onProjectChange()">
                    <option value="">-- 选择项目 --</option>
                </select>
            </div>
            <nav>
                <button class="nav-btn active" data-tab="dashboard">仪表盘</button>
                <button class="nav-btn cmd-highlight" data-tab="commands">⚡ 命令中心</button>
                <button class="nav-btn" data-tab="outline">大纲</button>
                <button class="nav-btn" data-tab="characters">人物</button>
                <button class="nav-btn" data-tab="world">世界观</button>
                <button class="nav-btn" data-tab="chapters">正文</button>
                <button class="nav-btn" data-tab="review">审阅</button>
            </nav>
        </header>
        <main id="content">
        </main>
    </div>
    <script src="/static/app.js"></script>

    <!-- Create Project Modal -->
    <div id="create-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h2>新建小说项目</h2>
            <div class="modal-body">
                <label>小说标题</label>
                <input type="text" id="create-title" class="modal-input" placeholder="输入小说标题" autofocus>

                <label>存储路径</label>
                <div class="path-row">
                    <input type="text" id="create-path" class="modal-input" placeholder="~/Documents/drafts/">
                    <button id="pick-folder-btn" class="cmd-btn pick-folder-btn" onclick="pickFolder()">📁 选择文件夹</button>
                </div>

                <label>类型</label>
                <select id="create-type" class="modal-input">
                    <option value="web_novel">网络小说</option>
                    <option value="short_story">短篇小说</option>
                </select>

                <div id="create-error" class="error" style="display:none;"></div>
            </div>
            <div class="modal-buttons">
                <button class="nav-btn" onclick="closeCreateModal()">取消</button>
                <button class="cmd-btn" id="create-submit-btn" onclick="submitCreateProject()">创建项目</button>
            </div>
        </div>
    </div>
</body>
</html>
