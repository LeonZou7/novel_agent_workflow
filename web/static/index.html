<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Writer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-left">
                <h1 id="project-title">📖 Novel Writer</h1>
                <select id="project-selector" class="project-select" onchange="onProjectChange()">
                    <option value="">-- 选择项目 --</option>
                </select>
            </div>
            <nav>
                <button class="nav-btn active" data-tab="dashboard">仪表盘</button>
                <button class="nav-btn cmd-highlight" data-tab="commands">⚡ 命令中心</button>
                <button class="nav-btn" data-tab="outline">大纲</button>
                <button class="nav-btn" data-tab="characters">人物</button>
                <button class="nav-btn" data-tab="world">世界观</button>
                <button class="nav-btn" data-tab="chapters">正文</button>
                <button class="nav-btn" data-tab="review">审阅</button>
            </nav>
        </header>
        <main id="content">
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
