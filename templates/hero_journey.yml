name: hero_journey
label: "英雄之旅"
description: "Joseph Campbell 的英雄之旅十二阶段模板。"

structure:
  stages:
    - name: "平凡世界"
      description: "英雄在普通世界的日常生活"
    - name: "冒险召唤"
      description: "事件打破平静，英雄被召唤踏上旅程"
    - name: "拒绝召唤"
      description: "英雄因恐惧/犹豫而拒绝出发"
    - name: "遇见导师"
      description: "导师出现，给予英雄指引或特殊物品"
    - name: "跨越门槛"
      description: "英雄正式离开平凡世界，进入非凡世界"
    - name: "考验·盟友·敌人"
      description: "在新世界中接受考验，结交盟友，识别敌人"
    - name: "接近核心"
      description: "接近旅程的核心（地点/真相/终极试炼）"
    - name: "重大考验"
      description: "面对最大的恐惧/敌人，经历'死亡与重生'"
    - name: "获得奖赏"
      description: "获得胜利果实（宝物/知识/和解）"
    - name: "返回之路"
      description: "带着奖赏返回平凡世界的旅程"
    - name: "复活"
      description: "在平凡世界面临最后一次净化/考验"
    - name: "带着灵药归来"
      description: "将奖赏融入平凡世界，改变自己也改变世界"
