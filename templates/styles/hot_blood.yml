name: 热血燃文
description: 情绪饱满，节奏紧凑，高潮密集，善用反转和爽点，适合男频爽文、战斗升级类。

sentence_pattern:
  - 短促有力，大量感叹句
  - 战斗描写节奏极快，像漫画分镜
  - 关键时刻用短句堆叠制造冲击感
  - 善用"然而""可是""就在这时"制造反转

vocabulary:
  - 力量感词汇（"碾压""轰碎""撕裂""燃烧"）
  - 情绪词汇强烈（"不甘""愤怒""狂喜""震惊"）
  - 战斗术语干脆利落

tone_markers:
  - 情绪起伏大，爽点密集
  - 主角高光时刻要写出"燃"感
  - 打脸情节要有对比和反差
  - 读者情绪要跟着主角走

rhythm:
  - 铺垫→低谷→爆发→爽点，循环推进
  - 每章结尾必须有钩子或爽点
  - 战斗不超过 800 字，节奏要快

example: |
  "跪下！"
  灵压如山岳倾覆，林风双膝一沉，地面龟裂。
  全场哄笑。
  一个废物，也敢挑战内门弟子？
  林风咬紧牙关，鲜血从嘴角溢出。
  他的膝盖，在颤抖。
  然后——
  他站了起来。
  "你说什么？"他抬起头，眼中金光乍现，"再说一遍。"
  那一刻，所有人脸上的笑容，凝固了。
