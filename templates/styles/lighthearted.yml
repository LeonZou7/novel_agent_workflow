name: 轻松幽默
description: 语言轻松诙谐，善用吐槽和反差萌，节奏轻快，适合日常向、轻喜剧、校园类。

sentence_pattern:
  - 口语化，像朋友聊天
  - 善用短句制造笑点节奏
  - 吐槽和内心 OS 是主要幽默手段
  - 对话活泼，角色互动有化学反应

vocabulary:
  - 生活化，接地气
  - 适度使用流行梗（但不过时）
  - 比喻要有趣、出人意料
  - 避免沉重或阴暗的用词

tone_markers:
  - 轻松愉快，读起来嘴角上扬
  - 角色性格鲜明，有喜感
  - 困境用幽默化解，不卖惨
  - 感情线轻松自然，不狗血

rhythm:
  - 节奏轻快，不拖沓
  - 笑点和温情交替
  - 小矛盾→搞笑化解→感情升温

example: |
  "你确定要报名？"学长上下打量林风，"我们社团的要求很高的。"
  "多高？"
  "起码得会做饭。"
  "……这是武术社还是厨艺社？"
  "上次训练完大家都饿了，不会做饭的人只能啃压缩饼干。"学长一脸认真，"你忍心吗？"
  林风沉默了三秒。
  "我会煮泡面。"
  "加蛋吗？"
  "加。"
  "恭喜你，通过了。"
