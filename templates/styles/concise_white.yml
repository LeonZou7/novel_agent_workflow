name: 白话简洁
description: 语言直白干练，不堆砌辞藻，以短句为主，节奏明快，适合升级流和快节奏网文。

sentence_pattern:
  - 短句为主，每句不超过 20 字
  - 少用从句和修饰语
  - 动作描写干脆利落，不拖泥带水
  - 对话简洁有力，少用语气词

vocabulary:
  - 口语化，贴近读者日常用语
  - 避免生僻字和文言词汇
  - 用具体动词代替抽象描述

tone_markers:
  - 节奏快、信息密度高
  - 画面感强，像电影分镜
  - 情绪传递靠动作和对话，少用内心独白

rhythm:
  - 段落短，3-5 句一段
  - 大量使用对话推动剧情
  - 场景切换干脆，不拖过渡

example: |
  林风握紧拳头，指节发白。
  "你说什么？"
  对面那人嗤笑一声，抬手一指："废物就是废物，连灵根都没有，还想进宗门？"
  林风没说话。他转身走了。
  走出三步，他停下来。
  "三天后，我会让你收回这句话。"
