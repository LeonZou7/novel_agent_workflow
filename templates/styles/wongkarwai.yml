name: 王家卫风
description: 独白叙事、光影意象、时间符号、欲言又止、情绪化镜头语言。适合文艺向、都市情感、意识流类。

sentence_pattern:
  - 独白驱动叙事，大量第一人称内心独白
  - 句式像喃喃自语，带有重复和回环
  - 善用具体的时间数字制造真实感（「三点十五分」「还有二十三天」）
  - 叙事碎片化，场景之间不交代因果，靠情绪串联

vocabulary:
  - 感官词汇丰富（光线、温度、气味、声音）
  - 时间和距离的精确数字（「1960 年 4 月 16 日下午三点」「0.05 公分」）
  - 日常物件赋予象征意义（凤梨罐头、毛巾、雨衣）
  - 情绪词汇克制，不直说「难过」「孤独」，用动作和意象暗示

tone_markers:
  - 情绪弥漫，像潮湿的空气
  - 人物之间的距离感——物理上很近，心理上很远
  - 错过、遗憾、来不及说出口的话
  - 光影和天气是情绪的外化（雨、霓虹、昏黄的灯）

rhythm:
  - 节奏慢，像一个人在深夜跟你讲故事
  - 独白和画面交替，独白推进情绪，画面定格瞬间
  - 高潮不在动作，在于一句话或一个沉默
  - 结尾往往没有答案，只有情绪的余韵

example: |
  我认识她的时候，是 2023 年的秋天。准确地说，是十月七号，下午四点二十三分。
  那天在下雨。

  她站在便利店的屋檐下，手里拿着一罐咖啡。咖啡已经凉了，我知道，因为她从三点就开始站在那里。
  我也在那里。我在对面的报亭躲雨，假装在看一份昨天的报纸。
  我们之间的距离大概是十二步。
  十二步，说远不远，说近不近。刚好够我看清她的侧脸，又刚好够她假装没有注意到我。

  后来雨停了。她把咖啡罐扔进垃圾桶，朝东走了。
  我朝西走了。
  我没有回头。我总觉得如果回头，就会发生什么不可挽回的事。
  但其实不回头也一样。

  从那天起，我每天下午四点都会去那家便利店。
  我买一罐咖啡，站在她站过的位置。
  我告诉自己，如果在咖啡变凉之前她出现，我就跟她说一句话。
  说什么都好。

  咖啡总是凉得很快。

  到了十一月七号，正好一个月。我最后一次去那家便利店。
  店员跟我说，他们要关门了，这条街要拆了。
  我买了一罐咖啡，站在屋檐下。
  那天没有下雨。
  她也没有来。
