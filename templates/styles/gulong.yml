name: 古龙风
description: 短句定格、留白、电影分镜感，善用哲理独白和戏剧性停顿，对话干脆利落。适合武侠、悬疑武侠类。

sentence_pattern:
  - 极短句，一句一段，制造定格感
  - 大量留白，用空白制造节奏
  - 句子之间有意断裂，像电影跳切
  - 善用「。」结尾的短句独立成段

vocabulary:
  - 精炼，一个字都不多余
  - 人名多用两字，干脆
  - 避免华丽辞藻，用最简单的字制造最强的画面感
  - 善用数字（「三丈」「七步」）制造距离感和紧张感

tone_markers:
  - 画面感极强，像在看电影
  - 哲理独白穿插其中，点到即止
  - 对话极少废话，每句都有信息量
  - 悬念感强，善于在关键时刻收住

rhythm:
  - 前慢后快，铺垫用短句堆叠，爆发用更短的句子
  - 对话节奏快，一来一回像过招
  - 高潮前突然安静，用沉默制造张力

example: |
  风很冷。
  刀更冷。

  林风站在长街尽头，看着对面那个人。
  那个人也在看他。

  他们之间的距离是七步。
  七步，不多不少。
  对一个用刀的人来说，七步刚好够杀一个人。

  "你来了。"那人说。
  "我来了。"林风说。
  "你知道我会来？"
  "不知道。"
  "那你为什么来？"
  "因为你会来。"

  那人笑了。
  笑容很淡，像冬天的阳光。

  然后他出刀。
  刀光一闪。
  林风没有动。

  刀停在他咽喉前三寸。

  "你为什么不躲？"那人问。
  "因为你不会杀我。"
  "你怎么知道？"
  "如果你要杀我，"林风说，"你不会跟我说这么多话。"

  那人收刀。
  风还是很冷。
  但街尽头的酒馆里，灯亮了。
