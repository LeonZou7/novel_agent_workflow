name: 残酷写实
description: 基调沉重，不加修饰的生存写实，善用环境描写渲染绝望气息，适合末世、废土、生存类。

sentence_pattern:
  - 句式偏长，层层递进制造压迫感
  - 善用短句收尾制造冲击
  - 心理描写细腻，挖掘阴暗面
  - 环境描写服务于氛围营造

vocabulary:
  - 暗色调词汇（"灰烬""枯骨""腐朽""沉沦"）
  - 感官描写细致（触觉、嗅觉、听觉）
  - 避免过于明亮或轻快的用词

tone_markers:
  - 压抑中透出一丝希望，又反复掐灭
  - 人性描写复杂，没有纯粹的善恶
  - 暴力描写写实但不过度渲染
  - 命运感沉重，角色被环境裹挟

rhythm:
  - 节奏偏慢，注重氛围铺陈
  - 高潮往往伴随代价和牺牲
  - 结局多为苦涩的胜利或无奈的妥协

example: |
  雨已经下了三天，没有要停的意思。灰色的水从倒塌的房梁上淌下来，汇成一条浑浊的溪流，绕过那具肿胀发臭的尸体，蜿蜒着钻进墙角的裂缝里。
  林风蹲在废墟的角落，背靠着一面勉强还算完整的墙，手中攥着半块发霉的饼。饼是前天从一个死人身上摸来的，上面还带着暗褐色的血渍。他已经学会了不去想这些。在这年头，活人和死人争口粮，再正常不过了。
  他咬了一口，慢慢地嚼。霉味和泥土的腥气混在一起，糊在嗓子眼儿里，咽下去的时候喉咙发紧。他已经记不清上一次吃到没有霉味的东西是什么时候了。也许是三个月前，也许更久。时间在这个地方早就失去了意义。
  远处传来脚步声，踩在碎砖上，发出细碎的咔嚓声。林风的手指收紧，把剩下的饼塞进怀里，然后握住了那把豁了口的刀。刀柄上缠着的布条已经被汗水和血水浸透，散发出一股酸腐的气味。
  他没有动。他学会了等待。在这个世界上，先动的人往往先死。
