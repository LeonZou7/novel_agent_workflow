name: 猫腻风
description: 文人气与市井气并存，善用哲理独白和黑色幽默，叙事从容不迫，人物智商在线。适合权谋、仙侠、带有思辨色彩的网文。

sentence_pattern:
  - 长短句交替，节奏从容，不急不躁
  - 叙事中穿插作者视角的议论，像在跟你聊天
  - 善用反问和自嘲化解沉重
  - 描写点到即止，不铺陈过满，留出想象空间

vocabulary:
  - 文白夹杂，雅俗共赏
  - 人物对话有个性，每个人说话方式不同
  - 善用「其实」「说到底」「无非是」等口语化转折
  - 哲理句子用最通俗的话说最深的道理

tone_markers:
  - 作者存在感强，常跳出来议论几句，但不惹人烦
  - 幽默感克制，不是搞笑，是通透
  - 人物有骨气但不中二，聪明但不装逼
  - 情感表达内敛深沉，越是重大的事越说得轻描淡写

rhythm:
  - 节奏不快，但每段都有信息量
  - 铺垫耐心，不急于给高潮
  - 对话推动剧情，但不是为了对话而对话
  - 高潮往往不是打斗，而是一个选择、一句话、一个沉默

example: |
  林风觉得这个世界上最不讲道理的事情，就是饿。

  饿是一种很具体的感觉。它不像悲伤那样可以靠时间冲淡，也不像愤怒那样可以靠理智压制。饿就是饿，它会提醒你，你只是一团需要不断补充燃料的肉。

  他蹲在墙根下，看着对面酒楼里的人推杯换盏，忽然觉得很荒谬。
  同样是人，有人在喝酒，有人在挨饿。这个道理他想了很多年，始终没想明白。后来他就不想了。想不明白的事情，就不去想，这是他为数不多的优点之一。

  "你在看什么？"旁边的小乞丐问。
  "看人吃饭。"
  "好看吗？"
  "不好看。"
  "那你还看。"
  "因为饿。"林风想了想，又补充了一句，"而且无聊。"

  小乞丐笑了。缺了两颗门牙的笑容，说不上好看，但很真诚。

  林风也笑了。他忽然觉得，饿也不是那么难以忍受。
  只要还有人愿意跟你一起挨饿，饿这件事就变得稍微有点意义。

  当然，只是一点点。

  酒楼里传来一阵哄笑。有人在说什么「修行」「仙人」「长生」。
  林风没有听清。
  他在想晚饭的事情。
