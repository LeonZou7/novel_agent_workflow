name: 猫腻风
description: 文人气与市井气并存，叙事从容不迫，善用哲理独白和黑色幽默。人物智商在线，对话讲究，情感内敛深沉。适合权谋、仙侠、带有思辨色彩的网文。参考《庆余年》《将夜》。

sentence_pattern:
  - 长短句交替，节奏从容，像一个人在火炉边慢慢讲一个很长的故事
  - 叙事中穿插作者视角的议论，语气随意但往往一语中的
  - 善用反问和自嘲化解沉重，但骨子里是认真的
  - 描写点到即止，不铺陈过满，留白比写满更有力量

vocabulary:
  - 文白夹杂，雅俗共赏，用最通俗的话讲最深的道理
  - 人物对话有强烈个性，每个人说话的方式、节奏、用词都不同
  - 善用「其实」「说到底」「无非是」「何苦」等口语化转折带出哲理
  - 意象偏冷：雪、风、边城、荒原、灯火，但冷中有暖

tone_markers:
  - 作者存在感强，偶尔跳出来议论几句，像跟你聊天，但不惹人烦
  - 幽默感克制通透，不是搞笑，是看透世事之后的释然
  - 人物有骨气但不中二，有傲气但不装逼，聪明但不卖弄
  - 越是重大的事越说得轻描淡写，越是小事反而写得郑重
  - 情感表达内敛深沉，不说「我爱你」，说「你饿不饿」

rhythm:
  - 节奏不快，但每段都有信息量，没有废笔
  - 铺垫耐心，不急于给高潮，让读者自己感受到情绪在积累
  - 对话推动剧情，但每句话都在揭示人物性格或关系
  - 高潮往往不是打斗，而是一个选择、一句话、一个沉默
  - 结尾余韵悠长，像雪地里的一行脚印，渐行渐远

example: |
  边城的冬天很冷。

  这种冷不是那种文人墨客笔下的诗意的冷，而是一种实实在在的、能冻死人的冷。风从北方吹来，卷着雪粒子，打在脸上像刀子。街上没有行人，连野狗都缩在墙角不敢动。

  少年背着小姑娘从城门走进来的时候，守城的士兵看了他们一眼，没有说话。
  在边城，能活着走到这里的人，都值得一个不说话的注视。

  小姑娘趴在少年背上，脸埋在他脖子里。她的手很凉，但少年的脖子很暖。
  "桑桑，冷不冷？"
  "不冷。"
  "骗人。"
  "嗯，冷。"
  "那你怎么不说？"
  "说了也没用，又不会变暖和。"

  少年没有接话。他把背上的小姑娘往上颠了颠，让她趴得更稳一些，然后继续往前走。
  雪越下越大，他的脚印很快就被盖住了。
  但他没有回头看过脚印。走路的人，不需要回头看。

  很多年后，有人问他，你这一路走来，最怕的是什么？
  他想了想，说：最怕她饿着。

  问话的人觉得这个答案很荒谬。你经历过那么多生死，打过那么多场仗，最怕的居然是一个姑娘饿着？
  但他没有解释。
  有些事情，不需要解释。懂的人自然懂，不懂的人，解释了也不懂。

  他只是在想，那天在边城，如果他走快一点，她就能早一刻喝上热汤。
  但他走不快。因为雪太大，因为她太重，因为他舍不得颠得太厉害。
  说到底，是因为他想走慢一点。
  慢一点，路就长一点。
  路长一点，她就能在他背上多待一会儿。

  这个道理，他也是后来才明白的。
