name: 古风文雅
description: 文笔典雅，用词考究，善用四字短语和古风意象，适合仙侠、古言类作品。

sentence_pattern:
  - 长短句交错，节奏如行云流水
  - 善用四字短语和对仗句式
  - 景物描写讲究意境，借景抒情
  - 适当使用文言句式增强古韵

vocabulary:
  - 偏文雅，适度使用古风词汇（如"须臾""倏然""恍若"）
  - 人名、地名讲究音韵美感
  - 避免现代网络用语

tone_markers:
  - 意境悠远，留白含蓄
  - 情感表达克制内敛
  - 战斗描写注重气势而非血腥

rhythm:
  - 段落稍长，注重起承转合
  - 描写与叙事交替，张弛有度
  - 高潮前有铺垫蓄势

example: |
  暮色四合，残阳如血，山风裹挟着松涛之声自谷底席卷而上，将崖顶那人的衣袂吹得猎猎作响。
  林风负手而立，目光越过层叠的云海，落在远处那座若隐若现的山峰之上——那是他此行的终点，亦是此生的赌注。手中长剑似有所感，剑身嗡鸣不止，震得袖口微微发颤。
  "你来了。"声音自雾中飘来，缥缈不定，仿佛从四面八方同时响起，又仿佛只在耳畔低语。
  他没有答话。三载苦修，千里赴约，所为者不过今日一战。他缓缓抬手，以指抚过剑脊，那剑便安静下来，像是听懂了主人的心意。
  远处雾气忽然翻涌，如沸水泼雪，倏忽间便散了个干净。一人青衫磊落，负剑而立，与他相距不过三丈。
  四目相对，杀意无声蔓延。崖上松针无风自落，在两人之间缓缓飘坠。
