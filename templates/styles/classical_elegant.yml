name: 古风文雅
description: 文笔典雅，用词考究，善用四字短语和古风意象，适合仙侠、古言类作品。

sentence_pattern:
  - 长短句交错，节奏如行云流水
  - 善用四字短语和对仗句式
  - 景物描写讲究意境，借景抒情
  - 适当使用文言句式增强古韵

vocabulary:
  - 偏文雅，适度使用古风词汇（如"须臾""倏然""恍若"）
  - 人名、地名讲究音韵美感
  - 避免现代网络用语

tone_markers:
  - 意境悠远，留白含蓄
  - 情感表达克制内敛
  - 战斗描写注重气势而非血腥

rhythm:
  - 段落稍长，注重起承转合
  - 描写与叙事交替，张弛有度
  - 高潮前有铺垫蓄势

example: |
  暮色四合，山风猎猎。
  林风立于断崖之上，衣袂翻飞，手中长剑嗡鸣不止。
  "你来了。"声音自雾中传来，不辨方位。
  他没有答话，只是缓缓抬剑。
  剑身映着最后一缕残阳，殷红如血。
  须臾间，雾散人现。
  两人相距三丈，目光相接，杀意无声蔓延。
