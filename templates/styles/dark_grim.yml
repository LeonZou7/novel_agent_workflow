name: 暗黑压抑
description: 基调沉重，氛围压抑，善用环境描写渲染阴郁气息，适合暗黑奇幻、末世、悬疑类。

sentence_pattern:
  - 句式偏长，层层递进制造压迫感
  - 善用短句收尾制造冲击
  - 心理描写细腻，挖掘阴暗面
  - 环境描写服务于氛围营造

vocabulary:
  - 暗色调词汇（"灰烬""枯骨""腐朽""沉沦"）
  - 感官描写细致（触觉、嗅觉、听觉）
  - 避免过于明亮或轻快的用词

tone_markers:
  - 压抑中透出一丝希望，又反复掐灭
  - 人性描写复杂，没有纯粹的善恶
  - 暴力描写写实但不过度渲染
  - 命运感沉重，角色被环境裹挟

rhythm:
  - 节奏偏慢，注重氛围铺陈
  - 高潮往往伴随代价和牺牲
  - 结局多为苦涩的胜利或无奈的妥协

example: |
  雨下了三天。
  林风蹲在废墟里，看着手中半块发霉的饼。旁边是一具尸体，已经肿胀发臭。
  他没有挪开。
  这年头，活人和死人争地盘，太正常了。
  他咬了一口饼，嚼了很久，咽下去。
  味道说不上来。反正他已经不在乎味道了。
  远处传来脚步声。他把饼塞进怀里，握紧了那把豁口的刀。
