name: 悬疑紧张
description: 节奏紧凑，信息层层揭露，善用伏笔和误导，适合推理、悬疑、惊悚类。

sentence_pattern:
  - 短句制造紧张感，长句铺陈细节
  - 善用省略号和破折号制造停顿
  - 细节描写暗示线索，不直说
  - 视角切换制造信息差

vocabulary:
  - 感官词汇丰富（"寒意""低语""阴影""异响"）
  - 模糊表述制造不确定性（"似乎""仿佛""不确定"）
  - 精确数字和时间增加真实感

tone_markers:
  - 不安感贯穿始终
  - 信息不对称，读者比角色多知道一点或少知道一点
  - 每揭开一层谜题，露出更深的谜团
  - 氛围大于动作，暗示大于明示

rhythm:
  - 张弛有度，紧张→短暂喘息→更紧张
  - 章末留悬念，让人忍不住翻页
  - 真相揭露要有冲击力

example: |
  林风推开病房门的时候，走廊里消毒水的气味忽然浓烈起来，像是有什么东西被惊动了。
  病床上的人背对着他躺着，被子裹得很紧，只露出一截灰白的头发。床头柜上的水杯还是满的——他注意到杯壁上没有指纹，连一圈水渍都没有。这杯水从昨天到现在，没有人动过。
  "爸，我来了。"
  没有回应。监护仪上的数字平稳地跳动着，68、69、68，像是某种沉默的倒计时。他走近两步，目光落在地板上。
  窗帘拉着，但缝隙里漏进来的光刚好照出一串脚印。脚印从床边开始，间距很均匀，像是一个走路很稳的人留下的。它延伸到卫生间门口，然后——消失了。
  不是被水渍盖住，不是渐渐变淡，而是在门槛的位置戛然而止，像踩进了一个不存在的洞里。
  林风盯着那扇紧闭的卫生间门。门缝下面透出一线微弱的光，忽明忽暗，像是有什么东西在里面呼吸。
  然后他听到了水声。很轻，像是有人在洗手。
  他回头看了看病床上的父亲。被子下面的人一动不动。
  水声停了。
