name: 悬疑紧张
description: 节奏紧凑，信息层层揭露，善用伏笔和误导，适合推理、悬疑、惊悚类。

sentence_pattern:
  - 短句制造紧张感，长句铺陈细节
  - 善用省略号和破折号制造停顿
  - 细节描写暗示线索，不直说
  - 视角切换制造信息差

vocabulary:
  - 感官词汇丰富（"寒意""低语""阴影""异响"）
  - 模糊表述制造不确定性（"似乎""仿佛""不确定"）
  - 精确数字和时间增加真实感

tone_markers:
  - 不安感贯穿始终
  - 信息不对称，读者比角色多知道一点或少知道一点
  - 每揭开一层谜题，露出更深的谜团
  - 氛围大于动作，暗示大于明示

rhythm:
  - 张弛有度，紧张→短暂喘息→更紧张
  - 章末留悬念，让人忍不住翻页
  - 真相揭露要有冲击力

example: |
  林风推开病房门。
  病床上的人背对着他，被子裹得很紧。
  "爸，我来了。"
  没有回应。
  他走近两步，注意到床头柜上的水杯还是满的。杯壁上没有指纹。
  窗帘拉着，但缝隙里透进来的光，照出地板上一串脚印。
  脚印从床边延伸到卫生间门口。
  然后，消失了。
  卫生间的门，缓缓开了。
