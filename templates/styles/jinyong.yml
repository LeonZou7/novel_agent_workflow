name: 金庸风
description: 典雅铺陈、诗词穿插、武功招式描写细腻、历史厚重感，文笔大气磅礴。适合武侠、历史传奇类。

sentence_pattern:
  - 长短句交替，节奏舒展大气
  - 武功描写用比喻和意象，不直说招式
  - 善用排比和对仗增强气势
  - 景物描写细腻，常借景抒情或暗示人物心境

vocabulary:
  - 偏文雅，适度使用古典词汇
  - 武功术语讲究音韵美感（如「降龙十八掌」「独孤九剑」）
  - 人名地名讲究典故和意境
  - 诗词自然穿插，不生硬

tone_markers:
  - 大气磅礴，有历史纵深感
  - 情感表达含蓄深沉，不直白
  - 武功描写是艺术，不是打架
  - 人物命运感强，个人在时代洪流中的挣扎

rhythm:
  - 起笔从容，铺垫充分
  - 打斗前有大段蓄势，打斗本身反而不长
  - 高潮往往伴随情感爆发或命运转折
  - 结尾常有余韵，留人回味

example: |
  那一掌拍出的时候，林风觉得自己整个人都轻了。

  降龙十八掌，他只学了前三掌。师父说过，这门功夫贵精不贵多，一掌练到极致，便胜过十八掌的花架子。他从前不信，此刻却隐隐有些明白了。
  掌风所至，院中那株老梅簌簌抖动，花瓣如雨般纷落。对面那人身形一晃，退了半步，脸上露出讶异之色。
  "好掌法。"那人赞了一声，旋即欺身而上，右掌自下而上划了个弧，轻飘飘地拍来。
  这一掌看似无力，林风却觉得周身空气都凝住了。他想退，脚却像生了根。
  师父曾吟过一句诗：「他强任他强，清风拂山岗。」
  此刻他才懂了。
  他不退反进，沉腰坐马，双掌平推而出。这一推毫无花巧，用的是最笨的力气，却恰好迎上了那人的掌势。
  两掌相交，没有声响。
  只有院中那株老梅，忽然从中间断成了两截。

  暮色四合，远处传来寺庙的钟声。
  林风收掌而立，掌心犹在发烫。他看着那株断梅，忽然有些心疼。
  那是师父种的。
